<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organized Table</title>
</head>
<body>
    <h1>Organized Table</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Product</th>
                <th>January</th>
                <th>February</th>
                <th>March</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Laptop</td>
                <td>5</td>
                <td>10</td>
                <td>15</td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td>8</td>
                <td>12</td>
                <td>18</td>
            </tr>
            <tr>
                <td>Tablet</td>
                <td>3</td>
                <td>6</td>
                <td>9</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Total</td>
                <td>16</td>
                <td>28</td>
                <td>42</td>
            </tr>
        </tfoot>
    </table>

    <h2>Student Scores</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Student</th>
                <th>Math</th>
                <th>Science</th>
                <th>English</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Ali</td>
                <td>85</td>
                <td>90</td>
                <td>88</td>
            </tr>
            <tr>
                <td>Umer</td>
                <td>78</td>
                <td>82</td>
                <td>80</td>
            </tr>
            <tr>
                <td>Sara</td>
                <td>92</td>
                <td>88</td>
                <td>91</td>
            </tr>
            <tr>
                <td>Aisha</td>
                <td>90</td>
                <td>95</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Usama</td>
                <td>80</td>
                <td>78</td>
                <td>83</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Average</td>
                <td>85.0</td>
                <td>86.7</td>
                <td>86.3</td>
            </tr>
        </tfoot>
    </table>

    
</body>
</html>
