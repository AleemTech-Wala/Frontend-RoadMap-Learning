<!DOCTYPE html>
<html>
<head>
    <title>Live Region Form</title>
</head>
<body>
    <h1>Contact Form</h1>
    
    <form>
        <label for="name">Name (required)</label>
        <input type="text" id="name" required aria-describedby="nameHelp">
        <small id="nameHelp">Enter your full name</small>
        <div aria-live="polite" role="alert" id="nameError"></div>
        <br><br>
        
        <label for="email">Email (required)</label>
        <input type="email" id="email" required>
        <div aria-live="polite" role="alert" id="emailError"></div>
        <br><br>
        
        <label for="message">Message (required)</label>
        <textarea id="message" required></textarea>
        <div aria-live="polite" role="alert" id="messageError"></div>
        <br><br>
        
        <button type="submit">Send Message</button>
    </form>
    
    <!-- Success message area -->
    <div aria-live="polite" role="status" id="successMessage"></div>
</body>
</html>
