<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alt text for image</title>
</head>
<body>
    <h2>Alt text for image</h2>
    <p>The alt attribute provides alternative information for 
        an image if a user for some reason cannot view it <br>
        (because of slow connection, an error in the src 
        attribute, or if the user uses a screen reader).</p>

        <img src="https://www.w3schools.com/html/pic_trulli.jpg" alt="A beautiful Trulli" width="500" height="333">
        <img src="https://placehold.co/300x200/3498db/ffffff?text=Laptop"
     alt="Dell XPS 15 laptop">

     
</body>
</html>
