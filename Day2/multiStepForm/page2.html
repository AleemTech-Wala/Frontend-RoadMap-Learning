<!DOCTYPE html>
<html>
<head>
    <title>Step 2: Account Details</title>
</head>
<body>
    <h1>Registration - Step 2 of 3</h1>
    <h2>Account Details</h2>
    
    <form>
        <fieldset>
            <legend>Step 2: Create Your Account</legend>
            
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" 
                   minlength="5" maxlength="15" required>
            <br><br>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" 
                   minlength="8" required>
            <br><br>
            
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" 
                   name="confirmPassword" minlength="8" required>
            <br><br>
        </fieldset>
        <br>
        
        <a href="page1.html">
            <button type="button">← Previous</button>
        </a>
        
        <a href="page3.html">
            <button type="button">Next: Preferences →</button>
        </a>
    </form>
</body>
</html>
