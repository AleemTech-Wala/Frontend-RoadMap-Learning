<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB APPLICATION FORM</title>
</head>
<body>
    <h1>Job Application Form</h1>
    <form>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="full_name">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" minlength="3" maxlength="50" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="email@gmail.com" required><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="+1234567890" pattern="^\+?[0-9]{10,15}$" required><br><br>
        </fieldset>
        <br>
        <fieldset>
            <legend>Documents</legend>

            <label for="resume">Upload Resume (PDF, DOC, DOCX only):</label><br>
            <input type="file" id="resume" name="resume" accept=".pdf, .doc, .docx" required><br><br>
        </fieldset>
        <br>
        <fieldset>
            <legend>Skills</legend>

            <p> Select your skills (at least one required)</p>

            <input type="checkbox" id="skill1" name="skills" value="html">
            <label for="skill1"> HTML</label><br>

            <input type="checkbox" id="skill2" name="skills" value="css">
            <label for="skill2"> CSS</label><br>

            <input type="checkbox" id="skill3" name="skills" value="javascript">
            <label for="skill3"> JavaScript</label><br>

            <input type="checkbox" id="skill4" name="skills" value="React">
            <label for="skill4"> React</label><br>

            <input type="checkbox" id="skill5" name="skills" value="MUI">
            <label for="skill5"> MUI</label><br>

            <input type="checkbox" id="skill6" name="skills" value="C#">
            <label for="skill6"> C#</label><br>

            <input type="checkbox" id="skill7" name="skills" value="SQL">
            <label for="skill7"> SQL</label><br>

            <input type="checkbox" id="skill8" name="skills" value="Git">
            <label for="skill8"> Git</label><br>

        </fieldset>
<br>
        <fieldset>
            <legend>Experience Level</legend>

            <input type="radio" id="fresher" name="Experience" value="fresher" required>
            <label for ="fresher"> Fresher</label><br>

            <input type="radio" id="junior" name="Experience" value="junior" required>
            <label for ="junior"> Junior (1-3 years)</label><br>

            <input type="radio" id="mid-level" name="Experience" value="mid-level" required>
            <label for ="mid-level"> Mid-level (3-5 years)</label><br>

            <input type="radio" id="senior" name="Experience" value="senior" required>
            <label for ="senior"> Senior (5+ years)</label><br><br>
        </fieldset>
<br>

        <fieldset>
            <legend>Salary Expectations</legend>

            <label for="salary">Expected Salary (in USD):</label><br>
            <input type="number" id="salary" name="salary" placeholder="50000" min="10000" max="100000" required>
        </fieldset>
        <br>

        <fieldset>
            <legend>Cover letter</legend>
            <label for="coverLetter" >Why should we hire you? (max 500 characters)</label><br>
            <textarea id="coverLetter" name="coverLetter" rows="6" cols="50" maxlength="500" 
            placeholder="Tell us about yourself, and why you are a good fit for this position." required></textarea><br><br>
        </fieldset><br>
        <button type="submit">Submit Application</button>
    </form>
</body>
</html>
